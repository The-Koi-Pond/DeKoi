name: CI Sanity

on:
  pull_request:

concurrency:
  group: ci-sanity-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sanity:
    name: Sanity Gate
    if: >
      github.event_name != 'pull_request' ||
      ((vars.DEKOI_CI_FULL_MODE || vars.DE_KOI_CI_FULL_MODE) != 'full' && (vars.DEKOI_CI_FULL_MODE || vars.DE_KOI_CI_FULL_MODE) != 'all')
    runs-on: ${{ fromJSON(vars.DEKOI_CI_RUNS_ON || vars.DE_KOI_CI_RUNS_ON || '"ubuntu-latest"') }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.2
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check:line-endings
      - run: pnpm check:desktop-contracts
      - run: pnpm check:storage-contracts
      - run: pnpm check:provider-secret-safety
      - run: pnpm check:runtime-contracts
      - run: pnpm check:frontend-boundaries
      - run: pnpm check:bunny-review
      - run: pnpm test
      - run: pnpm build
      - run: pnpm lint
      - run: pnpm format:check

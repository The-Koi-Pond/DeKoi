version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "11:00"
      timezone: America/New_York
    open-pull-requests-limit: 2

  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: weekly
      day: monday
      time: "11:20"
      timezone: America/New_York
    open-pull-requests-limit: 2

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "11:40"
      timezone: America/New_York
    open-pull-requests-limit: 2

  - package-ecosystem: pip
    directory: /.github/bunny-review
    schedule:
      interval: weekly
      day: monday
      time: "12:00"
      timezone: America/New_York
    open-pull-requests-limit: 2
